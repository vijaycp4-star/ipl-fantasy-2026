<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPL Fantasy '26 — Prediction League</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root { --display: 'Bebas Neue', cursive; --body: 'DM Sans', sans-serif; --mono: 'JetBrains Mono', monospace; --gold: #F5C842; --orange: #E8872A; --green: #4ADE80; --red: #F87171; --blue: #60A5FA; --bg: #08080C; --card: #0c0c10; --border: #161618; --border2: #1a1a1e; }
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: #ddd; font-family: var(--body); min-height: 100vh; }
::selection { background: #F5C84240; color: #fff; }
::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-track { background: var(--bg); } ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
.input-field { width: 100%; padding: 11px 14px; border-radius: 10px; border: 1px solid var(--border2); background: #111114; color: #ddd; font-family: var(--body); font-size: 14px; transition: border-color .15s; appearance: auto; outline: none; }
.input-field:focus { border-color: #F5C84240; }
.input-field::placeholder { color: #333; }
select.input-field { cursor: pointer; }
.primary-btn { width: 100%; padding: 14px 20px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--gold), var(--orange)); color: #000; font-family: var(--display); font-size: 16px; letter-spacing: 3px; cursor: pointer; transition: transform .1s, box-shadow .2s; box-shadow: 0 4px 20px rgba(245,200,66,.15); }
.primary-btn:active { transform: scale(.98); }
.primary-btn:hover { box-shadow: 0 4px 28px rgba(245,200,66,.25); }
.primary-btn:disabled { opacity: .3; cursor: not-allowed; }
.sm-btn { padding: 7px 14px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: #555; cursor: pointer; font-family: var(--mono); font-size: 11px; transition: all .15s; }
.sm-btn:hover { border-color: #333; }
.card { padding: 20px; border-radius: 14px; background: var(--card); border: 1px solid var(--border); }
.empty-box { text-align: center; padding: 48px 20px; border-radius: 16px; background: var(--card); border: 1px dashed var(--border2); }
.badge { display: inline-flex; align-items: center; justify-content: center; border-radius: 28%; font-family: var(--display); color: #fff; letter-spacing: 1px; flex-shrink: 0; }
.pill { font-size: 10px; font-family: var(--mono); padding: 3px 10px; border-radius: 6px; white-space: nowrap; display: inline-block; }
.lbl { font-size: 9px; color: #444; font-family: var(--mono); letter-spacing: 1.5px; margin-bottom: 6px; }
.nav-btn { flex: 1; padding: 8px 0 10px; border: none; cursor: pointer; background: transparent; display: flex; flex-direction: column; align-items: center; gap: 2px; transition: all .2s; position: relative; }
.nav-btn:hover { color: #888 !important; }
.del-btn { background: none; border: none; color: #2a2a2e; cursor: pointer; font-size: 14px; padding: 4px 6px; border-radius: 4px; transition: color .15s; }
.del-btn:hover { color: var(--red) !important; }
.stat-box { padding: 14px 10px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); text-align: center; }
.match-card { border-radius: 14px; background: var(--card); border: 1px solid var(--border); overflow: hidden; margin-bottom: 10px; }
.team-btn { flex: 1; padding: 14px 10px; border-radius: 12px; cursor: pointer; border: 2px solid var(--border2); background: #0e0e12; display: flex; flex-direction: column; align-items: center; gap: 6px; transition: all .15s; position: relative; }
.row-hover:hover { background: #0e0e1280 !important; }
.toast-el { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 12px; background: var(--border2); border: 1px solid #F5C84240; color: var(--gold); font-family: var(--mono); font-size: 12px; z-index: 200; box-shadow: 0 8px 32px rgba(0,0,0,.6); animation: toastIn .3s ease; pointer-events: none; }
.sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
.sync-dot.connected { background: var(--green); box-shadow: 0 0 6px var(--green); }
.sync-dot.offline { background: var(--red); }
.sync-dot.loading { background: var(--gold); animation: pulse 1s infinite; }
.setup-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
.setup-card { max-width: 520px; width: 100%; }
.setup-card h1 { font-family: var(--display); font-size: 40px; letter-spacing: 4px; background: linear-gradient(135deg, var(--gold), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 8px; }
.setup-card .sub { font-family: var(--mono); font-size: 11px; color: #444; letter-spacing: 1.5px; margin-bottom: 28px; }
.steps { font-family: var(--mono); font-size: 12px; color: #666; line-height: 2; margin-bottom: 20px; padding: 16px; background: #111114; border-radius: 10px; }
.steps b { color: #aaa; }
.steps a { color: var(--gold); text-decoration: none; }
.steps a:hover { text-decoration: underline; }
.err-banner { position: fixed; top: 0; left: 0; right: 0; padding: 10px 16px; background: #4A0A10; color: var(--red); font-family: var(--mono); font-size: 11px; z-index: 999; text-align: center; }
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }
@keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast" class="toast-el" style="display:none"></div>
<script>
/* ═══════════════════════════════════════════════════
   IPL FANTASY '26 — PREDICTION LEAGUE v2 (fixed)
   Firebase empty-array bug fixed + event delegation
   ═══════════════════════════════════════════════════ */

window.onerror = function(msg, url, line) {
  var b = document.createElement('div');
  b.className = 'err-banner';
  b.textContent = 'Error L' + line + ': ' + msg;
  document.body.appendChild(b);
  setTimeout(function(){ b.remove(); }, 8000);
};

var TEAMS = [
  { id:"csk", name:"Chennai Super Kings", short:"CSK", color:"#FDB913" },
  { id:"mi", name:"Mumbai Indians", short:"MI", color:"#006CB7" },
  { id:"rcb", name:"Royal Challengers Bengaluru", short:"RCB", color:"#D4213D" },
  { id:"kkr", name:"Kolkata Knight Riders", short:"KKR", color:"#6A2DC8" },
  { id:"srh", name:"Sunrisers Hyderabad", short:"SRH", color:"#F26522" },
  { id:"rr", name:"Rajasthan Royals", short:"RR", color:"#E73895" },
  { id:"dc", name:"Delhi Capitals", short:"DC", color:"#1768AC" },
  { id:"pbks", name:"Punjab Kings", short:"PBKS", color:"#E41E31" },
  { id:"gt", name:"Gujarat Titans", short:"GT", color:"#1DA1A2" },
  { id:"lsg", name:"Lucknow Super Giants", short:"LSG", color:"#1AA1DB" },
];
var TM = {};
TEAMS.forEach(function(t) { TM[t.id]=t; TM[t.short.toLowerCase()]=t; TM[t.short]=t; TM[t.name.toLowerCase()]=t; });
function T(id) { return TM[id] || null; }
function resolveTeam(s) {
  if(!s) return null;
  var k=s.trim().toLowerCase();
  return TM[k] || TEAMS.find(function(t){ return t.name.toLowerCase().indexOf(k)>=0 || k.indexOf(t.short.toLowerCase())>=0; });
}

/* ─── FIX: normalize Firebase data (Firebase drops empty arrays) ─── */
function normalize(d) {
  if (!d || typeof d !== 'object') d = {};
  d.players = Array.isArray(d.players) ? d.players : [];
  d.matches = Array.isArray(d.matches) ? d.matches : [];
  d.predictions = d.predictions || {};
  d.winPts = typeof d.winPts === 'number' ? d.winPts : 100;
  d.losePts = typeof d.losePts === 'number' ? d.losePts : -100;
  d.stake = typeof d.stake === 'number' ? d.stake : 100;
  d.created = d.created || new Date().toISOString();
  return d;
}

var FB_URL = localStorage.getItem('ipl_fb_url') || '';
var ROOM = localStorage.getItem('ipl_room') || '';
function fbBase() { return FB_URL + '/rooms/' + ROOM; }

function fbGet() {
  return fetch(fbBase() + '/data.json')
    .then(function(r) { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(function(d) { return normalize(d); })
    .catch(function(e) { console.error('FB GET:', e); return null; });
}
function fbSet(data) {
  return fetch(fbBase() + '/data.json', {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(data)
  }).then(function(){ return true; }).catch(function(e){ console.error('FB SET:', e); return false; });
}

var state = normalize({});
var tab = 'standings';
var activePlayer = localStorage.getItem('ipl_active_player') || '';
var matchFilter = 'upcoming';
var editMatchId = null;
var toastTimer = null;
var syncStatus = 'loading';
var pollInterval = null;

function saveState(ns) {
  state = ns || state;
  return fbSet(state).then(function(ok) { syncStatus = ok ? 'connected' : 'offline'; render(); });
}
function loadState() {
  syncStatus = 'loading'; render();
  return fbGet().then(function(d) {
    if (d) { state = d; syncStatus = 'connected'; }
    else { return fbSet(state).then(function(){ syncStatus = 'connected'; }); }
  }).then(function(){ render(); });
}
function startPolling() {
  if (pollInterval) clearInterval(pollInterval);
  pollInterval = setInterval(function() {
    fbGet().then(function(d) { if (d) { state = d; syncStatus = 'connected'; render(); } });
  }, 12000);
}

function flash(msg) {
  if (toastTimer) clearTimeout(toastTimer);
  var el = document.getElementById('toast');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
  toastTimer = setTimeout(function() { var e = document.getElementById('toast'); if(e) e.style.display='none'; }, 2800);
}

function badge(team, size) {
  size = size || 36;
  if (!team) return '';
  return '<div class="badge" style="width:'+size+'px;height:'+size+'px;font-size:'+Math.round(size*.32)+'px;background:linear-gradient(135deg,'+team.color+','+team.color+'BB);box-shadow:0 2px 10px '+team.color+'35">'+team.short+'</div>';
}
function pill(text, color, bdr) {
  color = color || '#555';
  return '<span class="pill" style="color:'+color+';background:'+color+'12;'+(bdr?'border:1px solid '+color+'20':'')+'">' + text + '</span>';
}
function esc(s) { if (!s) return ''; var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

/* ─── CUTOFF TIME LOGIC ─── */
var MONTHS = {jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
function parseMatchDate(dateStr) {
  if (!dateStr) return null;
  // Handle "28-Mar", "28 Mar", "04-Apr" etc.
  var parts = dateStr.trim().split(/[-\s\/]+/);
  if (parts.length < 2) return null;
  var day = parseInt(parts[0], 10);
  var monStr = parts[1].toLowerCase().substring(0, 3);
  var mon = MONTHS[monStr];
  if (isNaN(day) || mon === undefined) return null;
  // Year: assume 2026, use UTC to avoid timezone shift
  return new Date(Date.UTC(2026, mon, day));
}

function getCutoff(match) {
  // Group matches by date to detect double headers
  var matches = state.matches || [];
  var matchDate = match.date;
  if (!matchDate) return null;
  var sameDay = matches.filter(function(m) { return m.date === matchDate; });
  sameDay.sort(function(a, b) { return a.num - b.num; });

  var isDoubleHeader = sameDay.length >= 2;
  var isFirstMatch = isDoubleHeader && sameDay[0].id === match.id;

  // Cutoff hours in IST
  var cutoffHourIST, cutoffMinIST;
  if (isDoubleHeader && isFirstMatch) {
    cutoffHourIST = 15; cutoffMinIST = 30; // 3:30 PM IST
  } else {
    cutoffHourIST = 19; cutoffMinIST = 30; // 7:30 PM IST
  }

  var d = parseMatchDate(matchDate);
  if (!d) return null;
  // Convert IST to UTC: IST = UTC + 5:30, so UTC = IST - 5:30
  d.setUTCHours(cutoffHourIST - 5);
  d.setUTCMinutes(cutoffMinIST - 30);
  d.setUTCSeconds(0);
  d.setUTCMilliseconds(0);
  return d;
}

function isLocked(match) {
  if (match.winner) return true; // already decided
  var cutoff = getCutoff(match);
  if (!cutoff) return false; // no date = no lock
  return new Date() >= cutoff;
}

function getCutoffLabel(match) {
  var cutoff = getCutoff(match);
  if (!cutoff) return '';
  var now = new Date();
  if (now >= cutoff) return 'LOCKED';
  var diff = cutoff - now;
  var hrs = Math.floor(diff / 3600000);
  var mins = Math.floor((diff % 3600000) / 60000);
  if (hrs > 24) return '';
  if (hrs > 0) return hrs + 'h ' + mins + 'm left';
  return mins + 'm left';
}

function getStandings() {
  var players = state.players || [];
  var matches = state.matches || [];
  var preds = state.predictions || {};
  var stake = state.stake || 100;

  // Init per-player accumulators
  var acc = {};
  players.forEach(function(p) { acc[p.id] = { correct:0, wrong:0, skipped:0, pts:0 }; });

  // For each decided match, compute the pot
  matches.forEach(function(m) {
    if (!m.winner || m.winner === 'abandoned') return;
    var mPreds = preds[m.id] || {};
    var playerIds = players.map(function(p){return p.id;});
    // Collect active predictions only
    var activePreds = [];
    players.forEach(function(p) {
      var pred = mPreds[p.id];
      if (pred) activePreds.push(pred);
    });
    // Bet off check: if all predictions are on the same team, skip scoring
    var uniqueTeams = {};
    activePreds.forEach(function(t){ uniqueTeams[t] = true; });
    var allSameSide = activePreds.length > 0 && Object.keys(uniqueTeams).length === 1;
    if (allSameSide) {
      // Count as skipped for everyone (bet off, no money moves)
      players.forEach(function(p) {
        if (mPreds[p.id]) acc[p.id].skipped++;
        else acc[p.id].skipped++;
      });
      return;
    }

    var winners = [], losers = [];
    players.forEach(function(p) {
      var pred = mPreds[p.id];
      if (!pred) { acc[p.id].skipped++; return; }
      if (pred === m.winner) winners.push(p.id);
      else losers.push(p.id);
    });
    // Losers pay into the pot, winners split it
    var pot = losers.length * stake;
    var winShare = winners.length > 0 ? Math.round(pot / winners.length) : 0;
    losers.forEach(function(id) { acc[id].wrong++; acc[id].pts -= stake; });
    winners.forEach(function(id) { acc[id].correct++; acc[id].pts += winShare; });
  });

  return players.map(function(p) {
    var a = acc[p.id];
    return { id:p.id, name:p.name, correct:a.correct, wrong:a.wrong, skipped:a.skipped, pts:a.pts };
  }).sort(function(a,b) { return b.pts-a.pts || b.correct-a.correct; });
}

/* ═══════════════════════════════════════
   RENDER
   ═══════════════════════════════════════ */
function render() {
  var app = document.getElementById('app');
  if (!app) return;
  if (!FB_URL || !ROOM) { renderSetup(app); return; }

  var standings = getStandings();
  var players = state.players || [];
  var matches = state.matches || [];
  var completedCount = matches.filter(function(m){return m.winner;}).length;
  var upcomingCount = matches.filter(function(m){return !m.winner;}).length;

  app.innerHTML =
    '<header style="background:linear-gradient(180deg,#14120A,var(--bg));border-bottom:1px solid #1a1710;padding:0 16px;position:sticky;top:0;z-index:50">' +
      '<div style="max-width:680px;margin:0 auto;padding:14px 0 10px">' +
        '<div style="display:flex;align-items:center;justify-content:space-between">' +
          '<div>' +
            '<h1 style="font-family:var(--display);font-size:30px;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1">IPL FANTASY \'26</h1>' +
            '<div style="font-family:var(--mono);font-size:10px;color:#444;letter-spacing:1.5px;margin-top:3px">' +
              '<span class="sync-dot '+syncStatus+'"></span>' +
              players.length+' PLAYERS · '+matches.length+' MATCHES · '+completedCount+' DECIDED' +
            '</div>' +
          '</div>' +
          '<div style="text-align:right">' +
            '<div style="font-size:8px;color:#333;font-family:var(--mono);letter-spacing:1px;margin-bottom:3px">PLAYING AS</div>' +
            '<select id="playerSelect" class="input-field" style="width:auto;min-width:130px;padding:6px 10px;font-size:12px;text-align:right">' +
              '<option value="">Select yourself...</option>' +
              players.map(function(p){ return '<option value="'+p.id+'" '+(activePlayer===p.id?'selected':'')+'>'+esc(p.name)+'</option>'; }).join('') +
            '</select>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<nav style="max-width:680px;margin:0 auto;display:flex;gap:2px">' +
        navBtn('standings','Standings','🏆',0) +
        navBtn('matches','Matches','⚡',upcomingCount) +
        navBtn('schedule','Schedule','📅',0) +
        navBtn('squad','Squad','👥',0) +
        navBtn('settings','Settings','⚙️',0) +
      '</nav>' +
    '</header>' +
    '<main style="max-width:680px;margin:0 auto;padding:20px 16px 80px">' +
      (tab==='standings' ? renderStandings(standings, completedCount) : '') +
      (tab==='matches' ? renderMatches() : '') +
      (tab==='schedule' ? renderSchedule() : '') +
      (tab==='squad' ? renderSquad() : '') +
      (tab==='settings' ? renderSettings(completedCount) : '') +
    '</main>';

  bindEvents();
}

function navBtn(key, label, icon, bdg) {
  var active = tab===key;
  return '<button data-tab="'+key+'" class="nav-btn" style="color:'+(active?'var(--gold)':'#444')+';border-bottom:2px solid '+(active?'var(--gold)':'transparent')+'">' +
    '<span style="font-size:15px">'+icon+'</span>' +
    '<span style="font-size:9px;letter-spacing:1px;font-family:var(--mono)">'+label.toUpperCase()+'</span>' +
    (bdg>0?'<span style="position:absolute;top:4px;right:calc(50% - 20px);font-size:8px;background:var(--orange);color:#000;border-radius:6px;padding:1px 5px;font-family:var(--mono);font-weight:600">'+bdg+'</span>':'') +
  '</button>';
}

/* ─── STANDINGS ─── */
function renderStandings(standings, completedCount) {
  if (standings.length === 0) return '<div class="empty-box"><div style="font-size:48px;margin-bottom:10px">🏟️</div><p style="color:#555;font-size:13px">No players yet — go to Squad to add friends</p></div>';

  var podium = '';
  if (completedCount > 0 && standings.length >= 1) {
    var order = [standings[1], standings[0], standings[2]];
    podium = '<div style="display:flex;gap:8px;margin-bottom:20px;align-items:flex-end;justify-content:center">';
    order.forEach(function(s, idx) {
      if (!s) { podium += '<div style="flex:1"></div>'; return; }
      var rank = idx===1?1:idx===0?2:3;
      var h = rank===1?150:rank===2?120:95;
      var medals = ['','🥈','🥇','🥉'];
      var accent = rank===1?'var(--gold)':rank===2?'#C0C0C0':'#CD7F32';
      podium += '<div style="flex:1;height:'+h+'px;border-radius:14px;background:linear-gradient(180deg,'+accent+'12,var(--card) 70%);border:1px solid '+accent+'25;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:10px 6px;position:relative;overflow:hidden;animation:fadeUp .4s ease '+(0.1*idx)+'s both">' +
        '<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,'+accent+',transparent)"></div>' +
        '<span style="font-size:22px">'+medals[rank]+'</span>' +
        '<span style="font-family:var(--body);font-weight:700;font-size:'+(rank===1?15:12)+'px;color:#ddd;text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 4px">'+esc(s.name)+'</span>' +
        '<span style="font-family:var(--display);font-size:'+(rank===1?30:22)+'px;color:'+(s.pts>0?'var(--green)':s.pts<0?'var(--red)':'#555')+';letter-spacing:1px">'+(s.pts>0?'+₹':s.pts<0?'-₹':'₹')+Math.abs(s.pts)+'</span>' +
        '<span style="font-size:9px;color:#555;font-family:var(--mono)">'+s.correct+'W '+s.wrong+'L</span>' +
      '</div>';
    });
    podium += '</div>';
  }

  var tbl = '<div style="border-radius:14px;overflow:hidden;border:1px solid var(--border)">' +
    '<div style="display:grid;grid-template-columns:32px 1fr 44px 44px 44px 60px;padding:10px 14px;background:#0e0e12;font-family:var(--mono);font-size:9px;color:#444;letter-spacing:1px;border-bottom:1px solid var(--border)">' +
      '<span>#</span><span>PLAYER</span><span style="text-align:center">✓</span><span style="text-align:center">✗</span><span style="text-align:center">—</span><span style="text-align:right">NET ₹</span>' +
    '</div>';
  standings.forEach(function(s, i) {
    tbl += '<div class="row-hover" style="display:grid;grid-template-columns:32px 1fr 44px 44px 44px 60px;padding:12px 14px;align-items:center;border-bottom:1px solid #111114;background:'+(i===0&&completedCount>0?'linear-gradient(90deg,#F5C84206,transparent)':'transparent')+'">' +
      '<span style="font-family:var(--display);font-size:18px;color:'+(i===0?'var(--gold)':i===1?'#aaa':i===2?'#A0724E':'#333')+'">'+(i+1)+'</span>' +
      '<span style="font-family:var(--body);font-weight:700;font-size:14px;color:#ddd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(s.name)+'</span>' +
      '<span style="text-align:center;font-family:var(--mono);font-size:13px;color:var(--green)">'+s.correct+'</span>' +
      '<span style="text-align:center;font-family:var(--mono);font-size:13px;color:var(--red)">'+s.wrong+'</span>' +
      '<span style="text-align:center;font-family:var(--mono);font-size:13px;color:#444">'+s.skipped+'</span>' +
      '<span style="text-align:right;font-family:var(--display);font-size:22px;color:'+(s.pts>0?'var(--green)':s.pts<0?'var(--red)':'#555')+';letter-spacing:1px">'+(s.pts>0?'+₹':s.pts<0?'-₹':'₹')+Math.abs(s.pts)+'</span>' +
    '</div>';
  });
  tbl += '</div>';

  var stats = '';
  if (completedCount > 0 && standings[0]) {
    stats = '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:16px">' +
      '<div class="stat-box"><div style="font-size:9px;color:#444;font-family:var(--mono);letter-spacing:1.2px;margin-bottom:4px">LEADER</div><div style="font-size:17px;color:var(--gold);font-family:var(--display);letter-spacing:1px">'+esc(standings[0].name)+'</div></div>' +
      '<div class="stat-box"><div style="font-size:9px;color:#444;font-family:var(--mono);letter-spacing:1.2px;margin-bottom:4px">DECIDED</div><div style="font-size:17px;color:#888;font-family:var(--display);letter-spacing:1px">'+completedCount+' / '+(state.matches||[]).length+'</div></div>' +
      '<div class="stat-box"><div style="font-size:9px;color:#444;font-family:var(--mono);letter-spacing:1.2px;margin-bottom:4px">TOP NET</div><div style="font-size:17px;color:var(--green);font-family:var(--display);letter-spacing:1px">'+(standings[0].pts>0?'+₹':standings[0].pts<0?'-₹':'₹')+Math.abs(standings[0].pts)+'</div></div>' +
    '</div>';
  }
  return podium + tbl + stats;
}

/* ─── MATCHES ─── */
function renderMatches() {
  var matches = state.matches || [];
  var upcoming = matches.filter(function(m){return !m.winner;});
  var completed = matches.filter(function(m){return m.winner;});
  var filtered = matchFilter==='upcoming' ? upcoming : completed;
  var display = matchFilter==='completed' ? filtered.slice().reverse() : filtered;

  var html = '<div style="display:flex;gap:4px;margin-bottom:16px;background:var(--card);border-radius:10px;padding:3px;border:1px solid var(--border)">' +
    '<button data-filter="upcoming" style="flex:1;padding:10px 8px;border-radius:8px;border:none;cursor:pointer;background:'+(matchFilter==='upcoming'?'var(--border2)':'transparent')+';color:'+(matchFilter==='upcoming'?'var(--gold)':'#444')+';font-family:var(--mono);font-size:10px;letter-spacing:1px">UPCOMING ('+upcoming.length+')</button>' +
    '<button data-filter="completed" style="flex:1;padding:10px 8px;border-radius:8px;border:none;cursor:pointer;background:'+(matchFilter==='completed'?'var(--border2)':'transparent')+';color:'+(matchFilter==='completed'?'var(--gold)':'#444')+';font-family:var(--mono);font-size:10px;letter-spacing:1px">RESULTS ('+completed.length+')</button>' +
  '</div>';

  if (!activePlayer && matchFilter==='upcoming') {
    html += '<div style="padding:12px 16px;border-radius:10px;margin-bottom:14px;background:#F5C84208;border:1px solid #F5C84215;font-family:var(--mono);font-size:11px;color:#F5C84280">☝️ Select yourself in the header to make predictions</div>';
  }

  if (display.length === 0) {
    return html + '<div class="empty-box"><div style="font-size:48px;margin-bottom:10px">'+(matchFilter==='upcoming'?'🎯':'📋')+'</div><p style="color:#555;font-size:13px">'+(matchFilter==='upcoming'?'No upcoming matches. Add in Schedule tab.':'No results yet.')+'</p></div>';
  }

  display.forEach(function(m) {
    var t1=T(m.team1), t2=T(m.team2);
    if (!t1||!t2) return;
    var preds = (state.predictions||{})[m.id] || {};
    var myPred = activePlayer ? preds[activePlayer] : null;
    var done = !!m.winner;
    var abandoned = m.winner === 'abandoned';
    var locked = !done && isLocked(m);
    var cutoffLabel = !done ? getCutoffLabel(m) : '';
    var noPredict = done || locked;
    var playerIds = (state.players||[]).map(function(p){return p.id;});
    var predEntries = Object.keys(preds).filter(function(pid){return playerIds.indexOf(pid)>=0;});

    // Should we reveal picks? Only after cutoff (locked or done)
    var revealed = done || locked;
    // Before cutoff: only show YOUR OWN pick (match dropdown to saved identity)
    var myIdentity = localStorage.getItem('ipl_my_identity') || '';
    var isOwnView = activePlayer && activePlayer === myIdentity;
    var showMyPick = myPred && (revealed || isOwnView); // own pick visible anytime, others only after reveal
    html += '<div class="match-card">';
    // Header
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid #111114">' +
      '<div style="display:flex;gap:8px;align-items:center">' +
        '<span style="font-family:var(--display);font-size:13px;color:#333;background:#111114;padding:2px 8px;border-radius:6px">#'+m.num+'</span>' +
        pill(m.stage||'League', m.stage==='League'?'#555':'var(--gold)', true) +
        (locked?'<span style="font-size:9px;font-family:var(--mono);color:var(--red);background:#F8717112;padding:2px 8px;border-radius:4px;border:1px solid #F8717120">🔒 LOCKED</span>':'') +
        (abandoned?'<span style="font-size:9px;font-family:var(--mono);color:#888;background:#88888812;padding:2px 8px;border-radius:4px;border:1px solid #88888820">🌧 ABANDONED</span>':'') +
        (cutoffLabel && cutoffLabel!=='LOCKED'?'<span style="font-size:9px;font-family:var(--mono);color:var(--orange);background:#E8872A12;padding:2px 8px;border-radius:4px;border:1px solid #E8872A20">⏱ '+cutoffLabel+'</span>':'') +
      '</div>' +
      '<div style="display:flex;gap:6px;align-items:center">' +
        (m.date?'<span style="font-size:10px;color:#333;font-family:var(--mono)">'+esc(m.date)+'</span>':'') +
        (m.venue?'<span style="font-size:10px;color:#2a2a2e;font-family:var(--mono)">· '+esc(m.venue)+'</span>':'') +
      '</div>' +
    '</div>';
    // Teams
    html += '<div style="padding:14px 16px"><div style="display:flex;align-items:center;gap:8px">';
    // Team 1
    html += '<button '+(noPredict?'disabled':'')+' data-predict="'+m.id+'|'+m.team1+'" class="team-btn" style="border-color:'+((showMyPick&&myPred===m.team1)?t1.color:'var(--border2)')+';'+(done&&m.winner===m.team1?'background:'+t1.color+'15;':'')+(done&&m.winner!==m.team1?'opacity:.45;':'')+(locked&&!done?'opacity:.6;cursor:not-allowed;':'')+'">' +
      (done&&m.winner===m.team1?'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,'+t1.color+',transparent)"></div>':'') +
      badge(t1, 34) +
      '<span style="font-family:var(--display);font-size:16px;letter-spacing:2px;color:'+((showMyPick&&myPred===m.team1||m.winner===m.team1)?t1.color:'#666')+'">'+t1.short+'</span>' +
      (showMyPick&&myPred===m.team1?'<span style="font-size:9px;color:var(--green);font-family:var(--mono)">YOUR PICK</span>':'') +
      (done&&m.winner===m.team1?'<span style="font-size:10px">🏆</span>':'') +
    '</button>';
    html += '<div style="font-family:var(--display);font-size:14px;color:#222;padding:0 2px">VS</div>';
    // Team 2
    html += '<button '+(noPredict?'disabled':'')+' data-predict="'+m.id+'|'+m.team2+'" class="team-btn" style="border-color:'+((showMyPick&&myPred===m.team2)?t2.color:'var(--border2)')+';'+(done&&m.winner===m.team2?'background:'+t2.color+'15;':'')+(done&&m.winner!==m.team2?'opacity:.45;':'')+(locked&&!done?'opacity:.6;cursor:not-allowed;':'')+'">' +
      (done&&m.winner===m.team2?'<div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent,'+t2.color+',transparent)"></div>':'') +
      badge(t2, 34) +
      '<span style="font-family:var(--display);font-size:16px;letter-spacing:2px;color:'+((showMyPick&&myPred===m.team2||m.winner===m.team2)?t2.color:'#666')+'">'+t2.short+'</span>' +
      (showMyPick&&myPred===m.team2?'<span style="font-size:9px;color:var(--green);font-family:var(--mono)">YOUR PICK</span>':'') +
      (done&&m.winner===m.team2?'<span style="font-size:10px">🏆</span>':'') +
    '</button>';
    html += '</div>';
    // Before cutoff viewing someone else: generic message (no team revealed)
    if (!revealed && !isOwnView && myPred) {
      html += '<div style="margin-top:8px;text-align:center;font-size:10px;font-family:var(--mono);color:#555">✓ This player has predicted</div>';
    }
    // Remove prediction (only before cutoff, only if not revealed)
    if (!done && !locked && myPred && isOwnView) html += '<button data-rmpred="'+m.id+'" style="margin-top:4px;background:none;border:none;cursor:pointer;color:#333;font-size:10px;font-family:var(--mono);padding:4px 0;width:100%;text-align:center">↩ Change prediction</button>';
    // Detect "bet off" - all predictors picked the same team
    var uniquePicks = {};
    predEntries.forEach(function(pid) { uniquePicks[preds[pid]] = true; });
    var allSameSide = predEntries.length > 0 && Object.keys(uniquePicks).length === 1;
    // Predictions list
    if (predEntries.length > 0) {
      var stake = state.stake || 100;
      var mWinners = [], mLosers = [];
      if (done && !allSameSide && !abandoned) {
        predEntries.forEach(function(pid) { if (preds[pid]===m.winner) mWinners.push(pid); else mLosers.push(pid); });
      }
      var pot = mLosers.length * stake;
      var winShare = mWinners.length > 0 ? Math.round(pot / mWinners.length) : 0;

      html += '<div style="margin-top:12px;padding:10px 12px;border-radius:10px;background:#111114;border:1px solid var(--border)">';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">' +
        '<span style="font-size:9px;color:#333;font-family:var(--mono);letter-spacing:1px">PREDICTIONS ('+predEntries.length+'/'+(state.players||[]).length+')</span>';
      if ((allSameSide || abandoned) && revealed) {
        html += '<span style="font-size:10px;font-family:var(--mono);color:#888;background:#88888812;padding:2px 8px;border-radius:4px;border:1px solid #88888820">'+(abandoned?'🌧 NO RESULT':'BET OFF — all same side')+'</span>';
      } else if (done && !abandoned && pot > 0) {
        html += '<span style="font-size:10px;font-family:var(--mono);color:var(--gold)">POT: ₹'+pot+' → split '+mWinners.length+'</span>';
      }
      html += '</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
      predEntries.forEach(function(pid) {
        var tid = preds[pid];
        var pl = (state.players||[]).find(function(p){return p.id===pid;});
        var pt = T(tid);
        if (!pl) return;
        if (!revealed) {
          // Before cutoff: show name + "Predicted ✓" but hide which team
          html += '<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:#55555512;border:1px solid #55555520">' +
            '<span style="font-size:11px;font-family:var(--body);font-weight:600;color:#888">'+esc(pl.name)+'</span>' +
            '<span style="font-size:9px;font-family:var(--mono);color:#555">Predicted ✓</span>' +
          '</div>';
        } else if (allSameSide || abandoned) {
          // Bet off: show pick but neutral color, no +/- amounts
          html += '<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:#55555512;border:1px solid #55555520">' +
            '<span style="font-size:11px;font-family:var(--body);font-weight:600;color:#888">'+esc(pl.name)+'</span>' +
            (pt?'<span style="font-size:9px;font-family:var(--mono);color:'+pt.color+';opacity:.8">→ '+pt.short+'</span>':'') +
            '<span style="font-size:9px;font-family:var(--mono);color:#555">₹0</span>' +
          '</div>';
        } else {
          // Revealed: show full pick with amounts
          if (!pt) return;
          var isCorrect = done && m.winner===tid;
          var isWrong = done && m.winner && m.winner!==tid;
          var c = isCorrect?'var(--green)':isWrong?'var(--red)':pt.color;
          var amtText = '';
          if (isCorrect && winShare > 0) amtText = ' <span style="font-size:9px;font-family:var(--mono);color:var(--green)">+₹'+winShare+'</span>';
          if (isWrong) amtText = ' <span style="font-size:9px;font-family:var(--mono);color:var(--red)">-₹'+stake+'</span>';
          html += '<div style="display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;background:'+c+'12;border:1px solid '+c+'20">' +
            '<span style="font-size:11px;font-family:var(--body);font-weight:600;color:'+c+'">'+esc(pl.name)+'</span>' +
            '<span style="font-size:9px;font-family:var(--mono);color:'+pt.color+';opacity:.8">→ '+pt.short+'</span>' +
            (isCorrect?'<span style="font-size:10px">✓</span>':'') + (isWrong?'<span style="font-size:10px">✗</span>':'') +
            amtText +
          '</div>';
        }
      });
      html += '</div></div>';
    }
    // Declare/undo
    if (!done) {
      html += '<div style="margin-top:12px;border-top:1px solid #141418;padding-top:10px">' +
        '<div style="font-size:9px;color:#333;font-family:var(--mono);letter-spacing:1px;margin-bottom:8px">DECLARE RESULT</div>' +
        '<div style="display:flex;gap:6px">' +
          '<button class="sm-btn" data-declare="'+m.id+'|'+m.team1+'" style="flex:1;color:'+t1.color+';border-color:'+t1.color+'30;font-family:var(--display);font-size:12px;letter-spacing:1.5px;padding:8px 10px">'+t1.short+' WON</button>' +
          '<button class="sm-btn" data-declare="'+m.id+'|'+m.team2+'" style="flex:1;color:'+t2.color+';border-color:'+t2.color+'30;font-family:var(--display);font-size:12px;letter-spacing:1.5px;padding:8px 10px">'+t2.short+' WON</button>' +
        '</div>' +
        '<button class="sm-btn" data-abandon="'+m.id+'" style="width:100%;margin-top:6px;color:#888;border-color:#88888830;font-family:var(--display);font-size:11px;letter-spacing:1.5px;padding:6px 10px">🌧 ABANDON / NO RESULT</button>' +
      '</div>';
    } else {
      html += '<button data-undo="'+m.id+'" style="margin-top:8px;background:none;border:none;cursor:pointer;color:#2a2a2e;font-size:10px;font-family:var(--mono);padding:4px 0;width:100%;text-align:center">↩ Undo '+(abandoned?'abandon':'result')+'</button>';
    }
    html += '</div></div>';
  });
  return html;
}

        html += '<div class="card" style="padding:14px">' +

            '<div style="flex:1"><div class="lbl">TEAM 2</div><select id="editT2" class="input-field" style="font-size:12px">'+TEAMS.map(function(t){return '<option value="'+t.id+'" '+(m.team2===t.id?'selected':'')+'>'+t.short+'</option>';}).join('')+'</select></div>' +

        '</div>';

/* ─── SQUAD ─── */
function renderSquad() {
  var players = state.players || [];
  var html = '<div class="card" style="margin-bottom:20px">' +
    '<div style="font-family:var(--body);font-weight:700;font-size:15px;color:#ddd;margin-bottom:12px">Add Player</div>' +
    '<div style="display:flex;gap:8px">' +
      '<input id="pNameInput" class="input-field" placeholder="Enter name..." maxlength="20" style="flex:1">' +
      '<button id="addPlayerBtn" class="primary-btn" style="width:auto;padding:10px 24px;font-size:14px">ADD</button>' +
    '</div>' +
  '</div>';
  if (players.length > 0) {
    html += '<div style="font-family:var(--display);font-size:14px;color:#333;letter-spacing:3px;margin-bottom:12px">SQUAD ('+players.length+'/10)</div><div style="display:flex;flex-direction:column;gap:6px">';
    players.forEach(function(p) {
      html += '<div style="display:flex;align-items:center;padding:12px 14px;background:var(--card);border-radius:10px;border:1px solid var(--border);gap:10px">' +
        '<div style="width:32px;height:32px;border-radius:10px;background:'+(activePlayer===p.id?'linear-gradient(135deg,var(--gold),var(--orange))':'var(--border2)')+';display:flex;align-items:center;justify-content:center;font-family:var(--display);font-size:14px;color:'+(activePlayer===p.id?'#000':'#444')+'">'+esc(p.name.charAt(0).toUpperCase())+'</div>' +
        '<span style="flex:1;font-family:var(--body);font-weight:600;font-size:14px;color:#ddd">'+esc(p.name)+'</span>' +
        '<button class="del-btn" data-rmplayer="'+p.id+'">✕</button>' +
      '</div>';
    });
    html += '</div>';
  }
  return html;
}

/* ─── SETUP ─── */
function renderSetup(app) {
  app.innerHTML = '<div class="setup-screen"><div class="setup-card">' +
    '<h1>IPL FANTASY \'26</h1>' +
    '<div class="sub">PREDICTION LEAGUE — SELF-HOSTED</div>' +
    '<div class="card" style="margin-bottom:16px">' +
      '<div style="font-family:var(--body);font-weight:700;font-size:15px;color:#ddd;margin-bottom:12px">Quick Setup</div>' +
      '<div class="steps"><b>1.</b> Go to <a href="https://console.firebase.google.com" target="_blank">console.firebase.google.com</a><br><b>2.</b> Create a project → <b>Build → Realtime Database</b><br><b>3.</b> Create in <b>test mode</b> → copy the URL</div>' +
      '<div style="margin-bottom:14px"><div class="lbl">FIREBASE DATABASE URL</div><input id="setupUrl" class="input-field" placeholder="https://your-project.firebaseio.com" value="'+esc(FB_URL)+'"></div>' +
      '<div style="margin-bottom:16px"><div class="lbl">ROOM CODE (share with friends)</div><input id="setupRoom" class="input-field" placeholder="e.g. our-ipl-league" value="'+esc(ROOM)+'"><div style="font-family:var(--mono);font-size:10px;color:#333;margin-top:4px">Everyone uses the same room code to see shared data</div></div>' +
      '<button id="setupBtn" class="primary-btn">CONNECT & START</button>' +
      '<div id="setupError" style="margin-top:10px;color:var(--red);font-family:var(--mono);font-size:11px;display:none"></div>' +
    '</div>' +
    '<div style="font-family:var(--mono);font-size:10px;color:#333;text-align:center;line-height:1.6">Free Firebase plan — 1 GB storage, 100 connections</div>' +
  '</div></div>';

  document.getElementById('setupBtn').onclick = function() {
    var url = document.getElementById('setupUrl').value.trim().replace(/\/$/,'');
    var room = document.getElementById('setupRoom').value.trim().replace(/[^a-zA-Z0-9_-]/g, '-');
    var err = document.getElementById('setupError');
    if (!url || url.indexOf('https://') !== 0) { err.textContent='Enter a valid Firebase URL starting with https://'; err.style.display='block'; return; }
    if (!room) { err.textContent='Enter a room code'; err.style.display='block'; return; }
    err.style.display='none';
    FB_URL = url; ROOM = room;
    localStorage.setItem('ipl_fb_url', FB_URL);
    localStorage.setItem('ipl_room', ROOM);
    loadState().then(function(){ startPolling(); });
  };
}

/* ═══════════════════════════════════════
   EVENT BINDING
   ═══════════════════════════════════════ */
function bindEvents() {
  var ps = document.getElementById('playerSelect');
  if (ps) ps.onchange = function() { activePlayer = ps.value; localStorage.setItem('ipl_active_player', activePlayer); render(); };

  // Tab nav
  document.querySelectorAll('[data-tab]').forEach(function(b) {
    b.onclick = function() { tab = b.getAttribute('data-tab'); render(); };
  });
  // Match filter
  document.querySelectorAll('[data-filter]').forEach(function(b) {
    b.onclick = function() { matchFilter = b.getAttribute('data-filter'); render(); };
  });
  // Predict
  document.querySelectorAll('[data-predict]').forEach(function(b) {
    b.onclick = function() {
      if (!activePlayer) { flash('Select who you are first!'); return; }
      // Lock this player as your identity (prevents peeking by switching dropdown)
      localStorage.setItem('ipl_my_identity', activePlayer);
      var parts = b.getAttribute('data-predict').split('|');
      var mid=parts[0], tid=parts[1];
      var m = (state.matches||[]).find(function(x){return x.id===mid;});
      if (!m || m.winner) return;
      if (isLocked(m)) { flash('🔒 Predictions locked for this match!'); return; }
      var np = JSON.parse(JSON.stringify(state.predictions||{}));
      if (!np[mid]) np[mid] = {};
      np[mid][activePlayer] = tid;
      var pn = (state.players||[]).find(function(p){return p.id===activePlayer;});
      state.predictions = np;
      saveState(state).then(function(){ flash((pn?pn.name:'')+ ' → '+T(tid).short); });
    };
  });
  // Remove prediction
  document.querySelectorAll('[data-rmpred]').forEach(function(b) {
    b.onclick = function() {
      var mid = b.getAttribute('data-rmpred');
      var m = (state.matches||[]).find(function(x){return x.id===mid;});
      if (m && isLocked(m)) { flash('🔒 Predictions locked for this match!'); return; }
      var mid = b.getAttribute('data-rmpred');
      var np = JSON.parse(JSON.stringify(state.predictions||{}));
      if (np[mid] && np[mid][activePlayer]) delete np[mid][activePlayer];
      state.predictions = np;
      saveState(state).then(function(){ flash('Prediction removed'); });
    };
  });
  // Declare winner
  document.querySelectorAll('[data-declare]').forEach(function(b) {
    b.onclick = function() {
      var parts = b.getAttribute('data-declare').split('|');
      state.matches = (state.matches||[]).map(function(m){ return m.id===parts[0] ? Object.assign({},m,{winner:parts[1]}) : m; });
      saveState(state).then(function(){ flash(T(parts[1]).short+' wins! Scores updated.'); });
    };
  });
  // Abandon match
  document.querySelectorAll('[data-abandon]').forEach(function(b) {
    b.onclick = function() {
      var mid = b.getAttribute('data-abandon');
      state.matches = (state.matches||[]).map(function(m){ return m.id===mid ? Object.assign({},m,{winner:'abandoned'}) : m; });
      saveState(state).then(function(){ flash('🌧 Match abandoned — no bets counted'); });
    };
  });
  // Undo
  document.querySelectorAll('[data-undo]').forEach(function(b) {
    b.onclick = function() {
      var mid = b.getAttribute('data-undo');
      state.matches = (state.matches||[]).map(function(m){ return m.id===mid ? Object.assign({},m,{winner:null}) : m; });
      saveState(state).then(function(){ flash('Result undone'); });
    };
  });
  // Add player
  var apb = document.getElementById('addPlayerBtn');
  var apn = document.getElementById('pNameInput');
  if (apb) apb.onclick = function() {
    var name = apn ? apn.value.trim() : '';
    if (!name) return;
    if ((state.players||[]).length >= 10) { flash('Max 10 players'); return; }
    if ((state.players||[]).some(function(p){ return p.name.toLowerCase()===name.toLowerCase(); })) { flash('Name taken!'); return; }
    state.players = (state.players||[]).concat([{ id: Date.now().toString(), name: name }]);
    saveState(state).then(function(){ flash(name+' joined!'); });
  };
  if (apn) apn.onkeydown = function(e) { if (e.key==='Enter' && apb) apb.click(); };
  // Remove player
  document.querySelectorAll('[data-rmplayer]').forEach(function(b) {
    b.onclick = function() {
      var id = b.getAttribute('data-rmplayer');
      var p = (state.players||[]).find(function(x){return x.id===id;});
      var np = JSON.parse(JSON.stringify(state.predictions||{}));
      Object.keys(np).forEach(function(mid) { if (np[mid]&&np[mid][id]) delete np[mid][id]; });
      state.players = (state.players||[]).filter(function(x){return x.id!==id;});
      state.predictions = np;
      if (activePlayer===id) { activePlayer=''; localStorage.setItem('ipl_active_player',''); }
      if (localStorage.getItem('ipl_my_identity')===id) localStorage.removeItem('ipl_my_identity');
      saveState(state).then(function(){ flash((p?p.name:'Player')+' removed'); });
    };
  });
  // Add match
  var amb = document.getElementById('addMatchBtn');
  if (amb) amb.onclick = function() {
    var t1 = document.getElementById('addT1'); t1 = t1?t1.value:'';
    var t2 = document.getElementById('addT2'); t2 = t2?t2.value:'';
    var dt = document.getElementById('addDate'); dt = dt?dt.value.trim():'';
    var vn = document.getElementById('addVenue'); vn = vn?vn.value.trim():'';
    var st = document.getElementById('addStage'); st = st?st.value:'League';
    if (!t1||!t2) { flash('Select both teams'); return; }
    if (t1===t2) { flash('Pick different teams'); return; }
    var matches = state.matches||[];
    var m = { id:Date.now().toString(), num:matches.length+1, team1:t1, team2:t2, date:dt||null, venue:vn||null, stage:st, winner:null };
    state.matches = matches.concat([m]);
    saveState(state).then(function(){ flash('Match #'+m.num+' added'); });
  };
  // CSV upload
  var csv = document.getElementById('csvUpload');
  if (csv) csv.onchange = function(e) {
    var f = e.target.files ? e.target.files[0] : null; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      var lines = ev.target.result.split('\n').map(function(l){return l.trim();}).filter(Boolean);
      var nm = (state.matches||[]).slice();
      var added = 0;
      lines.forEach(function(line) {
        var parts = line.split(',').map(function(s){return s.trim();});
        if (parts.length<2) return;
        var first = !isNaN(parts[0]);
        var t1s,t2s,date,venue,stg;
        if (first) { t1s=parts[1]; t2s=parts[2]; date=parts[3]; venue=parts[4]; stg=parts[5]; }
        else { t1s=parts[0]; t2s=parts[1]; date=parts[2]; venue=parts[3]; stg=parts[4]; }
        var t1=resolveTeam(t1s), t2=resolveTeam(t2s);
        if (t1&&t2&&t1.id!==t2.id) {
          nm.push({ id:Date.now().toString()+added, num:nm.length+1, team1:t1.id, team2:t2.id, date:date||null, venue:venue||null, stage:stg||'League', winner:null });
          added++;
        }
      });
      if (added>0) { state.matches=nm; saveState(state).then(function(){ flash(added+' matches imported!'); }); }
      else flash('No valid matches found');
    };
    r.readAsText(f); e.target.value='';
  };
  // Edit match
  document.querySelectorAll('[data-startedit]').forEach(function(b) { b.onclick=function(){ editMatchId=b.getAttribute('data-startedit'); render(); }; });
  document.querySelectorAll('[data-canceledit]').forEach(function(b) { b.onclick=function(){ editMatchId=null; render(); }; });
  document.querySelectorAll('[data-saveedit]').forEach(function(b) {
    b.onclick = function() {
      var mid=b.getAttribute('data-saveedit');
      var t1=document.getElementById('editT1'); t1=t1?t1.value:'';
      var t2=document.getElementById('editT2'); t2=t2?t2.value:'';
      var dt=document.getElementById('editDate'); dt=dt?dt.value.trim():'';
      var vn=document.getElementById('editVenue'); vn=vn?vn.value.trim():'';
      var st=document.getElementById('editStage'); st=st?st.value:'League';
      if (!t1||!t2||t1===t2) { flash('Invalid teams'); return; }
      state.matches = (state.matches||[]).map(function(m){ return m.id===mid ? Object.assign({},m,{team1:t1,team2:t2,date:dt||null,venue:vn||null,stage:st}) : m; });
      editMatchId=null;
      saveState(state).then(function(){ flash('Match updated'); });
    };
  });
  // Delete match
  document.querySelectorAll('[data-delmatch]').forEach(function(b) {
    b.onclick = function() {
      var id=b.getAttribute('data-delmatch');
      var np=JSON.parse(JSON.stringify(state.predictions||{})); delete np[id];
      state.matches=(state.matches||[]).filter(function(m){return m.id!==id;}).map(function(m,i){return Object.assign({},m,{num:i+1});});
      state.predictions=np;
      saveState(state).then(function(){ flash('Match removed'); });
    };
  });
  // Export
  var eb = document.getElementById('exportBtn');
  if (eb) eb.onclick = function() {
    var b = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
    var u = URL.createObjectURL(b);
    var a = document.createElement('a'); a.href=u; a.download='ipl-fantasy-backup-'+new Date().toISOString().slice(0,10)+'.json'; a.click();
    URL.revokeObjectURL(u); flash('Backup saved!');
  };
  // Import
  var ib = document.getElementById('importFile');
  if (ib) ib.onchange = function(e) {
    var f = e.target.files?e.target.files[0]:null; if (!f) return;
    var r = new FileReader();
    r.onload = function(ev) {
      try {
        var d = JSON.parse(ev.target.result);
        state = normalize(d);
        saveState(state).then(function(){ flash('Restored!'); });
      } catch(x) { flash('Read error'); }
    };
    r.readAsText(f); e.target.value='';
  };
  // Change room
  var cr = document.getElementById('changeRoomBtn');
  if (cr) cr.onclick = function() {
    FB_URL=''; ROOM='';
    localStorage.removeItem('ipl_fb_url'); localStorage.removeItem('ipl_room');
    if (pollInterval) clearInterval(pollInterval);
    render();
  };
  // Reset
  var rb = document.getElementById('resetBtn');
  if (rb) rb.onclick = function() {
    if (!confirm('Delete ALL data? This cannot be undone.')) return;
    activePlayer=''; localStorage.setItem('ipl_active_player','');
    localStorage.removeItem('ipl_my_identity');
    state = normalize({});
    saveState(state).then(function(){ flash('Reset complete'); });
  };
}

/* ═══════════════════════════════════════
   INIT
   ═══════════════════════════════════════ */
try {
  render();
  if (FB_URL && ROOM) {
    loadState().then(function(){ startPolling(); });
  }
} catch(e) {
  document.getElementById('app').innerHTML = '<div style="padding:40px;color:var(--red);font-family:var(--mono)">Init error: '+e.message+'</div>';
}
</script>
